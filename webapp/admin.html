
<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
    }
    
    .page {
            display: none;
            padding: 40px;
        }

      .active {
          display: block;
      }
    
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #333;
      z-index: 9999;
    }

    #loginFormContainer {
    width: 100%;
    height: 80vh;
    display:flex;
    align-items: center;
    justify-content: center;
    }
    
    .login-box {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  
  <div id="loadingScreen">Loading...</div>

  <div id="loginForm" class="page active">
    <div id="loginFormContainer">
      <div class="login-box">
    <h2>Admin Login</h2>
    <form onsubmit="return login(event)">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit btn btn-sm">Login</button>
      <div class="error" id="error-msg"></div>
    </form>
  </div>
    </div>
  </div>
  
  <div id="adminDashboard" class="page">
    <p style=" text-align: center; background: darkgrey; color: #FFF; font-size: 26px; width: 100%;">
      admin dashboard
    </p>
    <div class="row justify-content-end ">
      <button class="btn btn-sm btn-primary" onclick="refreshData()">Refresh</button>
    </div>
    
    <div id="statsContainer" class="mb-4"></div>
    <div id="userListContainer" class="row align-items-around"></div>
  </div>

  <script>
    
    let attendanceData = [];
    
    async function loadData() {

          let resAttendanceData = await fetch(`https://yuvakendradirghmilan2026.onrender.com/attendanceList`);
          attendanceData = await resAttendanceData.json();
          //displayUserList();
          //displayUserListByTaluka();
          //displayStats();
      }
    
      window.addEventListener("load", loadData);
    
    function login(event) {
      event.preventDefault(); // Prevent form from submitting

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      // Hardcoded credentials
      const validUsername = 'admin';
      const validPassword = 'Dirghmilan2026';

      if (username === validUsername && password === validPassword) {
        displayUserListByTaluka();
        displayStats();
        showPage("adminDashboard");
      } else {
        errorMsg.textContent = 'Invalid username or password';
        showPage("loginForm");
      }

      return false;
    }
    
    function showPage(id) {          
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

    // Helper function: value count by key
    function countByKey(data, key) {
      return data.reduce((acc, curr) => {
        const val = curr[key];
        if (val) {
          acc[val] = (acc[val] || 0) + 1;
        }
        return acc;
      }, {});
    }

    // Attendance statistics function
    function displayStats() {
      const totalAttendance = attendanceData.length;
      const vargStats = countByKey(attendanceData, 'varg');
      const designationStats = countByKey(attendanceData, 'designation');
      const talukoStats = countByKey(attendanceData, 'taluko');

      const container = document.getElementById('statsContainer');
      container.innerHTML = `
        <h3>કુલ હાજર વ્યક્તિઓ: ${totalAttendance}</h3>

        <h4>વર્ગ પ્રમાણે હાજર:</h4>
        <ul>${Object.entries(vargStats).map(([k,v]) => `<li>${k}: ${v}</li>`).join('')}</ul>

        <h4>જવાબદારી પ્રમાણે હાજર:</h4>
        <ul>${Object.entries(designationStats).map(([k,v]) => `<li>${k}: ${v}</li>`).join('')}</ul>

        <h4>તાલુકા પ્રમાણે હાજર:</h4>
        <ul>${Object.entries(talukoStats).map(([k,v]) => `<li>${k}: ${v}</li>`).join('')}</ul>
      `;
    }

    // Display user list function
    function displayUserList() {
      const container = document.getElementById('userListContainer');

      // Create simple list with name + designation + varg
      const listHtml = attendanceData.map(user => `
        <div class="user-card col-md-12 col-md-4 col-lg-3" style="border:1px solid #ccc; padding:10px; margin-bottom:6px; border-radius:5px;">
          <strong>${user.name}</strong><br>
          જવાબદારી: ${user.designation}<br>
          વર્ગ: ${user.varg}<br>
          તાલુકો: ${user.taluko}<br>
          સમય: ${user.timestamp}
        </div>
      `).join('');

      container.innerHTML = `<h3>હાજર સભ્ય યાદી</h3>${listHtml}`;
    }
    
    function displayUserListByTaluka() {
    const container = document.getElementById('userListContainer');
    container.innerHTML = '<h3 class="mb-4">તાલુકાવાર હાજર સભ્ય યાદી</h3>';

    // Group users by Taluka
    const groupedByTaluka = attendanceData.reduce((acc, user) => {
      const taluko = user.taluko?.trim() || 'અજ્ઞાત';
      if (!acc[taluko]) acc[taluko] = [];
      acc[taluko].push(user);
      return acc;
    }, {});

    // Generate HTML for each Taluka group
    let finalHTML = '';
    Object.entries(groupedByTaluka).forEach(([taluko, users]) => {
      const userCards = users.sort((a,b)=>a.id - b.id).map(user => `
        <div class="user-card col-sm-12 col-md-6 col-lg-4" style="border:1px solid #ccc; padding:10px; margin-bottom:10px; border-radius:5px;">
          <strong>${user.name}</strong><br>
          જવાબદારી: ${user.designation}<br>
          વર્ગ: ${user.varg}<br>
          કેન્દ્ર: ${user.kendra}<br>
          સમય: ${user.timestamp}
        </div>
      `).join('');

      finalHTML += `
        <div class="taluka-section mb-4">
          <h4 class="mt-3 mb-2">${taluko}</h4>
          <div class="row">
            ${userCards}
          </div>
        </div>
      `;
    });

    container.innerHTML += finalHTML;
  }

  async function refreshData(){
    showLoading();
    
    await loadData();
    displayStats();
    displayUserListByTaluka();
    
    hideLoading();
  }
    
  function showLoading() {
    document.getElementById('loadingScreen').style.display = 'flex';
  }

  function hideLoading() {
    document.getElementById('loadingScreen').style.display = 'none';
  }

  </script>
  
  <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
